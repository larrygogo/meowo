[package]
name = "cc-app"
version = "0.1.1"
edition = "2021"

[lib]
name = "cc_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { workspace = true }

[dependencies]
cc-store = { path = "../../crates/cc-store" }
cc-reporter = { path = "../../crates/cc-reporter" }
tauri = { workspace = true, features = ["tray-icon"] }
tauri-plugin-window-state = { workspace = true }
tauri-plugin-autostart = { workspace = true }
tauri-plugin-updater = { workspace = true }
tauri-plugin-process = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
notify = { workspace = true }
sysinfo = "0.32"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_UI_WindowsAndMessaging", "Win32_UI_Shell", "Win32_Graphics_Gdi", "Win32_Foundation", "Win32_System_Threading"] }
uiautomation = "0.25"
