name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
      - name: 安装 Rust(含 clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust 构建缓存
        uses: Swatinem/rust-cache@v2
      - name: 安装前端依赖
        working-directory: app
        run: bun install --frozen-lockfile
      - name: 前端单测
        working-directory: app
        run: bunx vitest run
      - name: 构建前端(tsc + vite build)
        working-directory: app
        run: bun run build
      # tauri_build 在编译期校验 externalBin 文件存在，编译 cc-app 前必须先备好 sidecar
      - name: 准备 cc-reporter sidecar
        run: bun scripts/prepare-sidecar.mjs
      - name: Rust 测试
        run: cargo test --workspace
      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings

  # 依赖漏洞审计：第三方 crate / npm 包出现已知 CVE 时给出门禁/告警。
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 安装 cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Rust 依赖漏洞审计 (cargo audit)
        # 直接调用 cargo audit：仅在出现「漏洞(vulnerabilities)」时失败；unmaintained/unsound
        # 等 informational 告警不阻断（多为无法立即修的传递依赖）。
        # 不用 rustsec/audit-check action——它在 push 事件需 Checks API 写权限，
        # 而默认 GITHUB_TOKEN 只读 → 报「Resource not accessible by integration」。
        run: cargo audit
      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
      - name: 前端依赖漏洞审计 (bun audit)
        working-directory: app
        # npm 生态常有无法立即修的传递性低危告警，先告警不阻断（continue-on-error）。
        continue-on-error: true
        run: bun install --frozen-lockfile && bun audit
