name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
      - name: 安装 Rust(含 clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust 构建缓存
        uses: Swatinem/rust-cache@v2
      - name: 安装前端依赖
        working-directory: app
        run: bun install --frozen-lockfile
      - name: 前端单测
        working-directory: app
        run: bunx vitest run
      - name: 构建前端(tsc + vite build)
        working-directory: app
        run: bun run build
      # tauri_build 在编译期校验 externalBin 文件存在，编译 cc-app 前必须先备好 sidecar
      - name: 准备 cc-reporter sidecar
        run: bun scripts/prepare-sidecar.mjs
      - name: Rust 测试
        run: cargo test --workspace
      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings
