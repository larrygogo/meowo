# Pages 部署：需在 Settings → Pages → Source 选 "GitHub Actions"（一次性）。
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# 允许该 workflow 发布到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署；新推送取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static export
        run: bun run build
        env:
          NEXT_PUBLIC_SITE_URL: https://meowo.io

      - uses: actions/configure-pages@v5
        # 尝试自动为仓库启用 Pages（源=GitHub Actions），省去手动去 Settings 开启。
        # 若因权限无法自动启用，则需手动：Settings → Pages → Source 选 GitHub Actions。
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
