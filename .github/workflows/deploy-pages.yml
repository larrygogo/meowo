# Pages 部署：需在 Settings → Pages → Source 选 "GitHub Actions"（一次性）。
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  # 发版后也要重新部署（下载直链与更新日志是构建时从 GitHub API 取的，不重建就还是旧版本），
  # 但不能在这里挂 release 触发：那样 workflow 跑在 tag ref 上，而 github-pages
  # environment 只允许 main 部署，deploy job 会被直接拒掉。改由 site-redeploy.yml
  # 在 release 发布后 dispatch 本 workflow（跑在 main 上）。
  workflow_dispatch:

# 允许该 workflow 发布到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署；新推送取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static export
        run: bun run build
        env:
          NEXT_PUBLIC_SITE_URL: https://meowo.io
          # 构建时要读 releases/latest 拿安装包直链，带 token 避开匿名 API 限额。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/configure-pages@v5
        # 尝试自动为仓库启用 Pages（源=GitHub Actions），省去手动去 Settings 开启。
        # 若因权限无法自动启用，则需手动：Settings → Pages → Source 选 GitHub Actions。
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
